<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #fff;
            color: #333;
            padding: 28px 28px 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #1a1a1a;
        }
        .date {
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
        }
        .content {
            flex: 1;
            overflow-y: auto;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            padding: 9px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            line-height: 1.5;
        }
        li:last-child {
            border-bottom: none;
        }
        .release-group {
            margin-bottom: 20px;
        }
        .release-group:last-child {
            margin-bottom: 0;
        }
        .release-version {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 2px;
        }
        .release-date {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }
        .release-group ul li {
            font-size: 13px;
            padding: 6px 0;
        }
        .empty {
            color: #888;
            font-style: italic;
        }
        .footer {
            padding: 14px 0;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        button {
            padding: 7px 22px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #f8f8f8;
            cursor: pointer;
            font-size: 13px;
            color: #333;
        }
        button:hover {
            background: #eaeaea;
        }
        .btn-see-all {
            font-size: 12px;
            padding: 7px 14px;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #1e1e1e;
                color: #ccc;
            }
            h1 {
                color: #e0e0e0;
            }
            .date {
                color: #999;
            }
            li {
                border-bottom-color: #333;
            }
            .release-version {
                color: #e0e0e0;
            }
            .footer {
                border-top-color: #333;
            }
            button {
                background: #2a2a2a;
                border-color: #444;
                color: #ccc;
            }
            button:hover {
                background: #3a3a3a;
            }
            .empty {
                color: #999;
            }
        }
    </style>
</head>
<body>
    <h1 id="title">What's New</h1>
    <div class="date" id="date"></div>
    <div class="content">
        <div id="single-view">
            <ul id="items"></ul>
        </div>
        <div id="all-view" style="display:none"></div>
    </div>
    <div class="footer">
        <div>
            <button id="seeAllBtn" class="btn-see-all" style="display:none">See all release notes</button>
        </div>
        <button id="closeBtn">Got it</button>
    </div>
    <script>
        let allData = null;

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('en-US', {year: 'numeric', month: 'long', day: 'numeric'});
        }

        function renderSingle(data) {
            document.getElementById('title').textContent = 'What\u2019s New in Cohesion ' + data.version;
            document.getElementById('date').textContent = formatDate(data.date);
            document.getElementById('date').style.display = '';
            document.getElementById('single-view').style.display = '';
            document.getElementById('all-view').style.display = 'none';

            const list = document.getElementById('items');
            list.innerHTML = '';
            if (data.items.length === 0) {
                list.innerHTML = '<li class="empty">No release notes available.</li>';
            } else {
                data.items.forEach(item => {
                    const li = document.createElement('li');
                    li.textContent = item;
                    list.appendChild(li);
                });
            }

            document.getElementById('seeAllBtn').style.display = data.allReleases.length > 1 ? '' : 'none';
        }

        function renderAll(releases) {
            document.getElementById('title').textContent = 'Release Notes';
            document.getElementById('date').style.display = 'none';
            document.getElementById('single-view').style.display = 'none';
            document.getElementById('all-view').style.display = '';
            document.getElementById('seeAllBtn').style.display = 'none';

            const container = document.getElementById('all-view');
            container.innerHTML = '';

            releases.forEach(r => {
                const group = document.createElement('div');
                group.className = 'release-group';

                const version = document.createElement('div');
                version.className = 'release-version';
                version.textContent = 'v' + r.version;
                group.appendChild(version);

                const date = document.createElement('div');
                date.className = 'release-date';
                date.textContent = formatDate(r.date);
                group.appendChild(date);

                const list = document.createElement('ul');
                if (r.items.length === 0) {
                    list.innerHTML = '<li class="empty">No release notes available.</li>';
                } else {
                    r.items.forEach(item => {
                        const li = document.createElement('li');
                        li.textContent = item;
                        list.appendChild(li);
                    });
                }
                group.appendChild(list);
                container.appendChild(group);
            });
        }

        window.whatsnewAPI.onReleaseData((data) => {
            allData = data;
            renderSingle(data);
        });

        document.getElementById('seeAllBtn').addEventListener('click', () => {
            if (allData) renderAll(allData.allReleases);
        });

        document.getElementById('closeBtn').addEventListener('click', () => {
            window.whatsnewAPI.dismiss();
        });
    </script>
</body>
</html>
